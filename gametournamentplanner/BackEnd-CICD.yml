name: Backend CI/CD

on:
  push:
    branches: [ "main" ]

jobs:

  # -------------------
  # 1. LINT
  # -------------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: ./gradlew check

  # -------------------
  # 2. PACKAGE
  # -------------------
  package:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/spring_backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/spring_backend:latest

  # -------------------
  # 3. DEPLOY
  # -------------------
  deploy:
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            cd /home/your-user/app

            docker pull ${{ secrets.DOCKER_USERNAME }}/spring_backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/react_frontend:latest

            docker-compose down
            docker-compose up -d